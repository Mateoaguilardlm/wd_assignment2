<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Restaurant search and reservation platform">
        <meta name="keywords" content="restaurants, reservations, food, dining">
        <meta name="author" content="Mateo Aguilar">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
        <script src="js/script.js"></script>
        <title>TableFinder - Register</title>
    </head>
    <body class="background">
        <header>
            <div class="header-all">
                <a href="index.html" class="header-logo">
                    <img src="images/logo.png" alt="TableFinder logo">
                </a>

                <nav>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="restaurants.html">Restaurants</a></li>
                        <li><a href="recommend.html">Recommendations</a></li>
                        <li><a href="reservation.html">Reservation</a></li>
                    </ul>
                </nav>

                <a href="register.html" class="header-user">
                    <img src="images/user.png" alt="User icon">
                </a>
            </div>
        </header>

        <main>
            <div class="container">
            <h1>Create an Account</h1>
            <p>Please fill out the form below to save your preferences.</p>
            </div>

            <section class="form-container">
                <div id="registerErrorBox" class="error-box" role="alert"></div>

                <form id="register-form">
                    <div class="form-div">
                      <label for="username">Username</label>
                      <input type="text" id="username" name="username" autocomplete="username">
                      <span id="usernameError" class="error-msg"></span>
                    </div>

                    <div class="form-div">
                      <label for="email">Email Address</label>
                      <input type="email" id="email" name="email" autocomplete="email">
                      <span id="emailError" class="error-msg"></span>
                    </div>

                    <div class="form-div">
                      <label for="phone">Phone Number</label>
                      <input type="tel" id="phone" name="phone" autocomplete="tel">
                      <span id="phoneError" class="error-msg"></span>
                    </div>

                    <div class="form-div">
                      <label for="password">Password</label>
                      <input type="password" id="password" name="password" autocomplete="new-password">
                      <span id="passwordError" class="error-msg"></span>
                    </div>

                    <div class="form-div">
                      <label for="confirmPassword">Confirm Password</label>
                      <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password">
                      <span id="confirmPasswordError" class="error-msg"></span>
                    </div>

                    <fieldset class="form-div">
                      <legend>Gender</legend>
                      <div class="radio-group">
                        <label><input type="radio" name="gender" value="male"> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                      </div>
                      <span id="genderError" class="error-msg"></span>
                    </fieldset>

                    <fieldset class="form-div">
                      <legend>Dietary Preferences</legend>
                      <div class="checkbox-group">
                        <label class="checkbox-inline"><input type="checkbox" name="dietaryPrefs" value="vegan"> Vegan</label>
                        <label class="checkbox-inline"><input type="checkbox" name="dietaryPrefs" value="halal"> Halal</label>
                        <label class="checkbox-inline"><input type="checkbox" name="dietaryPrefs" value="gluten_free"> Gluten-free</label>
                        <label class="checkbox-inline"><input type="checkbox" name="dietaryPrefs" value="none"> None</label>
                      </div>
                      <span id="dietaryPrefsError" class="error-msg"></span>
                    </fieldset>

                    <div class="form-div">
                      <label for="country">Country / Region</label>
                      <select id="country" name="country">
                        <option value="">-- Select --</option>
                        <option value="au">Australia</option>
                        <option value="nz">New Zealand</option>
                        <option value="other">Other</option>
                      </select>
                      <span id="countryError" class="error-msg"></span>
                    </div>

                    <button type="submit" class="button">Submit</button>
                </form>
            </section>
        </main>

        <footer>
            <p> 2026 TableFinder | COS1000
